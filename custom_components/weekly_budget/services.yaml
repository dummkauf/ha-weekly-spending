add_expense:
  name: Add Expense
  description: Add a new expense to the weekly budget.
  fields:
    amount:
      name: Amount
      description: The expense amount.
      required: true
      example: 25.50
      selector:
        number:
          min: 0.01
          max: 100000
          step: 0.01
          mode: box
    description:
      name: Description
      description: A short description of the expense.
      required: true
      example: "Groceries"
      selector:
        text:

edit_expense:
  name: Edit Expense
  description: Edit an existing expense by its index (0-based).
  fields:
    index:
      name: Index
      description: The 0-based index of the expense to edit.
      required: true
      example: 0
      selector:
        number:
          min: 0
          max: 1000
          step: 1
          mode: box
    amount:
      name: Amount
      description: The new expense amount (leave blank to keep current).
      required: false
      example: 30.00
      selector:
        number:
          min: 0.01
          max: 100000
          step: 0.01
          mode: box
    description:
      name: Description
      description: The new description (leave blank to keep current).
      required: false
      example: "Updated groceries"
      selector:
        text:

delete_expense:
  name: Delete Expense
  description: Delete an expense by its index (0-based).
  fields:
    index:
      name: Index
      description: The 0-based index of the expense to delete.
      required: true
      example: 0
      selector:
        number:
          min: 0
          max: 1000
          step: 1
          mode: box

reset_budget:
  name: Reset Budget
  description: Reset the weekly budget back to the configured weekly limit, clearing all expenses and rollover.

set_weekly_limit:
  name: Set Weekly Limit
  description: Update the weekly spending limit.
  fields:
    amount:
      name: Amount
      description: The new weekly spending limit.
      required: true
      example: 200.00
      selector:
        number:
          min: 1
          max: 100000
          step: 0.01
          mode: box
